<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>for you, my love ❤️</title>

  <style>
    body {
      margin: 0;
      background-color: #050000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
        radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
      background-size: 550px 550px, 350px 350px;
      opacity: 0.3;
    }

    #heart {
      position: relative;
      width: 100%;
      height: 60vh;
    }

    .heart-word {
      position: absolute;
      color: #ff2e7a;
      font-family: Georgia, serif;
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      text-shadow: 0 0 6px #ff2e7a, 0 0 14px rgba(255, 46, 122, 0.6);
      opacity: 0;
      animation: fadeIn 1.5s forwards;
      transform: translate(-50%, -50%) scale(0.5);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @media (max-width: 600px) {
      #heart {
        height: 55vh;
      }
    }
  </style>
</head>

<body>
  <div id="heart"></div>

  <script>
    const container = document.getElementById('heart');
    const count = 200;

    for (let i = 0; i < count; i++) {
      const t = (i / count) * Math.PI * 2;

      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13 * Math.cos(t)
        - 5 * Math.cos(2 * t)
        - 2 * Math.cos(3 * t)
        - Math.cos(4 * t));

      const span = document.createElement('span');
      span.innerText = "I love you";
      span.className = "heart-word";

      const scale = 27;

      span.style.left = `calc(50% + ${x * scale}px)`;
      span.style.top = `calc(50% + ${y * scale}px)`;
      span.style.animationDelay = `${i * 0.015}s`;

      container.appendChild(span);
    }
  </script>
</body>
</html>
